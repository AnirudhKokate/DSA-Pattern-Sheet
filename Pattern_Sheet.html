<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Pattern Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161616;
    --surface: #1e1e1e;
    --border: #333333;
    --border-strong: #484848;
    --text-primary: #f0f0f0;
    --text-secondary: #a8a8a8;
    --text-muted: #6f6f6f;
    --sidebar-bg: #111111;
    --sidebar-text: #c6c6c6;
    --sidebar-muted: #606060;
    --sidebar-hover: #1a1a1a;
    --sidebar-active: #222222;

    --tp: #6c5fc7; --tp-bg: #f0effe; --tp-border: #d8d4f8;
    --hm: #1a8a6b; --hm-bg: #e8f7f2; --hm-border: #b8e8d8;
    --sw: #c47d1a; --sw-bg: #fdf3e3; --sw-border: #f5d89a;
    --ps: #b84c28; --ps-bg: #fdf0eb; --ps-border: #f5c4ad;
    --mv: #a83860; --mv-bg: #fceef4; --mv-border: #f2bdd3;
    --bm: #2264b8; --bm-bg: #eaf2fd; --bm-border: #b5d4f5;
    --ma: #437a1e; --ma-bg: #edf6e2; --ma-border: #bcdfa0;
    --bs: #5a5855; --bs-bg: #f3f2ef; --bs-border: #d8d5cc;
    --ap: #7c5c1e; --ap-bg: #fdf6e7; --ap-border: #f0d49a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; }

  html { font-size: 15px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ── */
  .topbar {
    height: 52px;
    background: var(--sidebar-bg);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    border-bottom: 1px solid #222222;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }
  .topbar-title {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 300;
    color: #f0f0f0;
    letter-spacing: 0.01em;
  }
  .topbar-title em {
    font-style: italic;
    color: #9d8fef;
  }
  .topbar-divider { flex: 1; }
  .topbar-count {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #777777;
    letter-spacing: 0.02em;
  }
  .topbar-count span {
    color: #e8e8e8;
    font-weight: 600;
    font-size: 14px;
  }

  /* ── Shuffle Button ── */
  .shuffle-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #1c1c1c;
    border: 1px solid #333333;
    border-radius: 6px;
    color: #bbbbbb;
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 5px 13px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    flex-shrink: 0;
    letter-spacing: 0.01em;
  }
  .shuffle-btn:hover {
    background: #282828;
    border-color: #484848;
    color: #f0f0f0;
  }
  .shuffle-btn:active { transform: scale(0.97); }
  .shuffle-btn svg { flex-shrink: 0; }

  /* ── Shuffle Toast ── */
  .shuffle-toast {
    position: fixed;
    top: 62px;
    right: 20px;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    z-index: 500;
    transform: translateY(-18px) translateX(12px) scale(0.95);
    transform-origin: top right;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.32s cubic-bezier(0.34, 1.3, 0.64, 1), opacity 0.18s ease;
    min-width: 280px;
    max-width: 280px;
  }
  .shuffle-toast.visible {
    transform: translateY(0) translateX(0) scale(1);
    opacity: 1;
    pointer-events: all;
  }
  .toast-eyebrow {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sidebar-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toast-dice { font-size: 11px; }
  .toast-title {
    font-size: 13px;
    font-weight: 500;
    color: #efefef;
    line-height: 1.3;
    margin-top: 1px;
  }
  .toast-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
    flex-wrap: wrap;
  }
  .toast-pattern-pill {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 9px;
    border-radius: 20px;
    border: 1px solid;
  }
  .toast-lc {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--sidebar-muted);
  }
  .toast-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
  }
  .toast-solve-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 5px;
    border: none;
    background: #9d8fef;
    color: white;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .toast-solve-btn:hover { background: #8b7de0; }
  .toast-jump-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid #2a2a2a;
    background: none;
    color: var(--sidebar-text);
    cursor: pointer;
    transition: background 0.15s;
  }
  .toast-jump-btn:hover { background: #1e1e1e; }
  .toast-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: #555555;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 5px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .toast-close:hover { color: #aaaaaa; }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 224px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid #202020;
    position: sticky;
    top: 52px;
    height: calc(100vh - 52px);
    overflow-y: auto;
    padding: 20px 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 2px; }

  .sidebar-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sidebar-muted);
    padding: 0 20px 10px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 2px solid transparent;
    text-decoration: none;
    user-select: none;
  }
  .nav-item:hover { background: var(--sidebar-hover); }
  .nav-item.active {
    background: var(--sidebar-active);
    border-left-color: var(--pattern-color, #9d8fef);
  }
  .nav-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--pattern-color, #888);
  }
  .nav-label {
    font-size: 13px;
    color: var(--sidebar-text);
    flex: 1;
    font-weight: 400;
  }
  .nav-item.active .nav-label { color: #f0f0f0; font-weight: 500; }
  .nav-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--sidebar-muted);
    background: #1a1a1a;
    padding: 1px 6px;
    border-radius: 10px;
  }
  .nav-item.active .nav-count { background: #2a2a2a; color: #888888; }

  /* ── Sidebar Group ── */
  .nav-group {}
  .nav-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 2px solid transparent;
    user-select: none;
  }
  .nav-group-header:hover { background: var(--sidebar-hover); }
  .nav-group-header.active {
    background: var(--sidebar-active);
    border-left-color: var(--ap);
  }
  .nav-group-icon {
    width: 7px;
    height: 7px;
    border-radius: 2px;
    flex-shrink: 0;
    background: var(--pattern-color, var(--ap));
  }
  .nav-group-label {
    font-size: 13px;
    color: var(--sidebar-text);
    flex: 1;
    font-weight: 400;
  }
  .nav-group-header.active .nav-group-label { color: #f0f0f0; font-weight: 500; }
  .nav-group-arrow {
    width: 14px;
    height: 14px;
    color: var(--sidebar-muted);
    transition: transform 0.22s;
    flex-shrink: 0;
  }
  .nav-group-total {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--sidebar-muted);
    background: #1a1a1a;
    padding: 1px 6px;
    border-radius: 10px;
  }
  .nav-group.collapsed .nav-group-arrow { transform: rotate(-90deg); }
  .nav-group-children {
    overflow: hidden;
    max-height: 300px;
    transition: max-height 0.25s ease, opacity 0.2s;
    opacity: 1;
  }
  .nav-group.collapsed .nav-group-children {
    max-height: 0;
    opacity: 0;
    pointer-events: none;
  }
  .nav-item.child {
    padding-left: 36px;
    border-left: 2px solid transparent;
  }
  .nav-item.child .nav-dot { width: 5px; height: 5px; }

  /* ── Main content ── */
  .main {
    flex: 1;
    min-width: 0;
    padding: 32px 40px 60px;
    overflow-y: auto;
  }

  /* ── Pattern section ── */
  .pattern-section {
    margin-bottom: 44px;
    scroll-margin-top: 72px;
    border-radius: 8px;
    transition: background 0.1s;
  }

  /* ── Unified section glow ── */
  @keyframes sectionTagGlow {
    0%          { color: var(--pattern-color); background: var(--pattern-bg); box-shadow: none; }
    20%, 70%    { color: var(--pattern-color); background: var(--pattern-bg);
                  box-shadow: 0 0 0 2px var(--pattern-border); }
    100%        { color: var(--pattern-color); background: var(--pattern-bg); box-shadow: none; }
  }
  @keyframes sectionTableGlow {
    0%          { box-shadow: none; border-color: var(--border); }
    20%, 70%    { box-shadow: 0 0 0 2px var(--pattern-border);
                  border-color: var(--pattern-border); }
    100%        { box-shadow: none; border-color: var(--border); }
  }

  /* All three target together, same duration, same keyframe shape */
  .pattern-section.section-glowing .section-tag {
    animation: sectionTagGlow 1s ease;
  }
  .pattern-section.section-glowing .problem-table {
    animation: sectionTableGlow 1s ease;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1.5px solid var(--pattern-border, var(--border));
  }
  .section-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--pattern-color);
    background: var(--pattern-bg);
    border: 1px solid var(--pattern-border);
    padding: 3px 10px;
    border-radius: 4px;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--text-primary);
    flex: 1;
  }
  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── Array Patterns group in main (Tabbed Panel) ── */
  .pattern-group {
    margin-bottom: 44px;
    scroll-margin-top: 72px;
  }
  .group-section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
    user-select: none;
  }
  .group-section-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--pattern-color);
    background: var(--pattern-bg);
    border: 1.5px solid var(--pattern-border);
    padding: 3px 10px;
    border-radius: 4px;
  }
  .group-section-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--text-primary);
    flex: 1;
  }
  .group-section-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    padding: 2px 0;
  }

  /* ── Tab bar ── */
  .tab-bar {
    display: flex;
    gap: 2px;
    border-bottom: 2px solid var(--pattern-border, var(--border));
    margin-top: 14px;
    margin-bottom: 20px;
  }
  .tab-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
    padding: 8px 15px;
    border: 1.5px solid transparent;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    position: relative;
    bottom: -2px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .tab-btn:hover {
    background: #2a2a2a;
    color: var(--child-color, var(--pattern-color));
  }
  .tab-btn.active {
    background: var(--surface);
    color: var(--child-color, var(--pattern-color));
    border-color: var(--child-border, var(--pattern-border));
    border-bottom-color: var(--surface);
    font-weight: 600;
  }
  .tab-btn-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--child-color, var(--pattern-color));
    opacity: 0.45;
    transition: opacity 0.15s;
  }
  .tab-btn.active .tab-btn-dot { opacity: 1; }
  .tab-btn-count {
    font-family: 'DM Mono', monospace;
    font-size: 10.5px;
    opacity: 0.55;
    transition: opacity 0.15s;
  }
  .tab-btn.active .tab-btn-count { opacity: 0.9; }

  /* ── Tab panels ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .tab-panel .pattern-section { margin-bottom: 0; scroll-margin-top: 0; }

  /* ── Problem table ── */
  .problem-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .problem-row {
    display: grid;
    grid-template-columns: 36px 1fr auto auto;
    align-items: center;
    padding: 0 16px;
    min-height: 46px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.12s;
  }
  .problem-row:last-child { border-bottom: none; }
  .problem-row:hover { background: #272727; }
  .problem-row.highlighted {
    background: #272727;
    animation: rowHighlight 1s ease;
  }
  @keyframes rowHighlight {
    0%, 100% { background: transparent; }
    20%, 70% { background: #2e2e2e; }
  }

  .row-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    user-select: none;
  }

  .row-title {
    font-size: 13.5px;
    color: var(--text-primary);
    font-weight: 400;
    text-decoration: none;
    transition: color 0.12s;
    padding: 12px 0;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .row-title:hover { color: var(--pattern-color); }
  .row-title svg {
    width: 13px;
    height: 13px;
    opacity: 0;
    flex-shrink: 0;
    transition: opacity 0.12s;
    color: var(--pattern-color);
  }
  .problem-row:hover .row-title svg { opacity: 1; }

  .row-lc {
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--pattern-color);
    min-width: 44px;
    text-align: right;
  }

  .platform-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .badge-lc  { background: #2a2a2a; color: #888888; border: 1px solid #3a3a3a; }
  .badge-gfg { background: #2a2a2a; color: #888888; border: 1px solid #3a3a3a; }
  .badge-cn  { background: #2a2a2a; color: #888888; border: 1px solid #3a3a3a; }

  /* ── Search ── */
  .search-wrap {
    margin-bottom: 28px;
    position: relative;
  }
  .search-input {
    width: 100%;
    height: 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 14px 0 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input:focus {
    border-color: #555555;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .sidebar {
      display: none;
      position: fixed;
      top: 52px;
      left: 0;
      height: calc(100vh - 52px);
      z-index: 90;
      width: 240px;
    }
    .sidebar.open { display: block; }
    .main { padding: 20px 18px 48px; }
    .topbar { padding: 0 16px; }
    .menu-btn { display: flex !important; }
    .shuffle-btn span { display: none; }
    .shuffle-toast { top: 62px; right: 12px; left: 12px; min-width: unset; }
  }
  @media (min-width: 769px) {
    .menu-btn { display: none !important; }
  }

  .menu-btn {
    background: none;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: var(--sidebar-text);
    width: 32px;
    height: 32px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="topbar">
  <button class="menu-btn" onclick="toggleMenu()" aria-label="Menu">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <line x1="2" y1="5" x2="14" y2="5"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="11" x2="14" y2="11"/>
    </svg>
  </button>
  <span class="topbar-title">DSA <em>Pattern</em> Sheet</span>
  <div class="topbar-divider"></div>
  <!-- Shuffle Button -->
  <button class="shuffle-btn" onclick="shuffleProblem()" title="Pick a random problem">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
      <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
    </svg>
    <span>Shuffle</span>
  </button>
  <span class="topbar-count" id="topbar-count"><span id="tc-problems">0</span> problems &middot; <span id="tc-patterns">0</span> patterns</span>
</header>

<!-- Shuffle Toast -->
<div class="shuffle-toast" id="shuffle-toast" role="status">
  <button class="toast-close" onclick="closeToast()" aria-label="Close">×</button>
  <div class="toast-eyebrow"><span class="toast-dice">🎲</span> Random Pick</div>
  <div class="toast-title" id="toast-title">—</div>
  <div class="toast-meta">
    <span class="toast-pattern-pill" id="toast-pill">—</span>
    <span class="toast-lc" id="toast-lc"></span>
  </div>
  <div class="toast-actions">
    <a class="toast-solve-btn" id="toast-solve" href="#" target="_blank" rel="noopener">
      Solve it
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10L10 2M5 2h5v5"/></svg>
    </a>
    <button class="toast-jump-btn" onclick="jumpToToastProblem()">Jump in sheet</button>
  </div>
</div>

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
/** Flatten all problems across all patterns (including group children). */
function getAllProblems() {
  const all = [];
  patterns.forEach(p => {
    if (p.isGroup) {
      p.children.forEach(child => {
        child.problems.forEach(prob => {
          all.push({ ...prob, patternId: child.id, patternName: child.name, patternColor: child.color, patternBg: child.bg, patternBorder: child.border });
        });
      });
    } else {
      p.problems.forEach(prob => {
        all.push({ ...prob, patternId: p.id, patternName: p.name, patternColor: p.color, patternBg: p.bg, patternBorder: p.border });
      });
    }
  });
  return all;
}

function countProblems(data) {
  return data.reduce((sum, p) => {
    if (p.isGroup) return sum + p.children.reduce((s, c) => s + c.problems.length, 0);
    return sum + p.problems.length;
  }, 0);
}

function buildProblemRow(prob, index) {
  return `
    <div class="problem-row" data-prob-id="${prob.patternId || ''}-${index}">
      <span class="row-num">${String(index + 1).padStart(2, '0')}</span>
      <a class="row-title" href="${prob.url}" target="_blank" rel="noopener">
        ${prob.title}
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 10L10 2M5 2h5v5"/>
        </svg>
      </a>
      <span class="row-lc">${prob.lc ? '#' + prob.lc : ''}</span>
      <span class="platform-badge ${platformClass[prob.platform]}">${platformLabel[prob.platform]}</span>
    </div>`;
}

function buildSection(p) {
  const section = document.createElement('section');
  section.className = 'pattern-section';
  section.id = p.id;
  section.style.setProperty('--pattern-color', p.color);
  section.style.setProperty('--pattern-bg', p.bg);
  section.style.setProperty('--pattern-border', p.border);

  const rows = p.problems.map((prob, i) => buildProblemRow(prob, i)).join('');
  section.innerHTML = `
    <div class="section-header">
      <span class="section-tag">${p.name}</span>
      <span class="section-count">${p.problems.length} problem${p.problems.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="problem-table">${rows}</div>`;
  return section;
}

/* ═══════════════════════════════════════════
   SCROLL & GLOW
═══════════════════════════════════════════ */
function glowSection(section) {
  if (!section) return;
  section.classList.remove('section-glowing');
  void section.offsetWidth;
  section.classList.add('section-glowing');
  setTimeout(() => section.classList.remove('section-glowing'), 1100);
}

function scrollToSection(sectionId) {
  // Check if this ID belongs to a child inside a tabbed group
  const parentGroup = patterns.find(p => p.isGroup && p.children.some(c => c.id === sectionId));
  if (parentGroup) {
    // Switch to the correct tab first
    switchTab(parentGroup.id, sectionId);
    // Scroll to the group container
    const groupEl = document.getElementById(parentGroup.id);
    if (groupEl) groupEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Glow the section after a brief paint delay
    setTimeout(() => glowSection(document.getElementById(sectionId)), 180);
    return;
  }

  const section = document.getElementById(sectionId);
  if (!section) return;
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });

  if (section.classList.contains('pattern-group')) {
    setTimeout(() => {
      const activePanel = section.querySelector('.tab-panel.active .pattern-section');
      glowSection(activePanel);
    }, 180);
    return;
  }
  const targets = section.matches('.pattern-section')
    ? [section]
    : [...section.querySelectorAll('.pattern-section')];
  targets.forEach(sec => glowSection(sec));
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function renderAll(data) {
  const navList = document.getElementById('nav-list');
  const content = document.getElementById('content');
  navList.innerHTML = '';
  content.innerHTML = '';

  const total    = countProblems(data);
  const topLevel = data.length;
  document.getElementById('tc-problems').textContent = total;
  document.getElementById('tc-patterns').textContent = topLevel;

  if (!data.length) {
    content.innerHTML = '<div class="empty">No problems match your search.</div>';
    return;
  }

  data.forEach((p, idx) => {
    if (p.isGroup) {
      // ── GROUP: sidebar (always expanded, children always visible) ──
      const groupTotalProbs = p.children.reduce((s, c) => s + c.problems.length, 0);
      const navGroup = document.createElement('div');
      navGroup.className = 'nav-group';
      navGroup.dataset.groupId = p.id;
      navGroup.innerHTML = `
        <div class="nav-group-header" style="--pattern-color:${p.color}">
          <span class="nav-group-icon" style="background:${p.color}; border-radius:2px;"></span>
          <span class="nav-group-label">${p.name}</span>
          <span class="nav-group-total">${groupTotalProbs}</span>
        </div>
        <div class="nav-group-children"></div>`;

      const groupHeader = navGroup.querySelector('.nav-group-header');
      groupHeader.addEventListener('click', () => {
        setActiveNav(groupHeader);
        scrollToSection(p.id);
        if (window.innerWidth <= 768) toggleMenu(false);
      });

      const childrenNav = navGroup.querySelector('.nav-group-children');
      p.children.forEach((child, ci) => {
        const childNav = document.createElement('div');
        childNav.className = 'nav-item child';
        childNav.style.setProperty('--pattern-color', child.color);
        childNav.innerHTML = `
          <span class="nav-dot" style="background:${child.color}"></span>
          <span class="nav-label">${child.name}</span>
          <span class="nav-count">${child.problems.length}</span>`;
        childNav.addEventListener('click', () => {
          setActiveNav(childNav);
          scrollToSection(child.id); // switchTab + scroll + glow handled inside
          if (window.innerWidth <= 768) toggleMenu(false);
        });
        childrenNav.appendChild(childNav);
      });
      navList.appendChild(navGroup);

      // ── GROUP: main content — tabbed panel ──
      const groupEl = document.createElement('div');
      groupEl.className = 'pattern-group';
      groupEl.id = p.id;
      groupEl.style.setProperty('--pattern-color', p.color);
      groupEl.style.setProperty('--pattern-bg', p.bg);
      groupEl.style.setProperty('--pattern-border', p.border);

      const subCount = p.children.length;

      // Header row
      const header = document.createElement('div');
      header.className = 'group-section-header';
      header.innerHTML = `
        <span class="group-section-tag">${p.name}</span>
        <span class="group-section-count">${subCount} sub-pattern${subCount !== 1 ? 's' : ''} · ${groupTotalProbs} problem${groupTotalProbs !== 1 ? 's' : ''}</span>`;
      groupEl.appendChild(header);

      // Tab bar
      const tabBar = document.createElement('div');
      tabBar.className = 'tab-bar';

      // Tab panels container
      const tabPanels = document.createElement('div');
      tabPanels.className = 'tab-panels';

      p.children.forEach((child, ci) => {
        // Tab button
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (ci === 0 ? ' active' : '');
        btn.dataset.childId = child.id;
        btn.style.setProperty('--child-color', child.color);
        btn.style.setProperty('--child-bg', child.bg);
        btn.style.setProperty('--child-border', child.border);
        btn.innerHTML = `
          <span class="tab-btn-dot"></span>
          ${child.name}
          <span class="tab-btn-count">${child.problems.length}</span>`;
        btn.addEventListener('click', () => switchTab(p.id, child.id));
        tabBar.appendChild(btn);

        // Tab panel
        const panel = document.createElement('div');
        panel.className = 'tab-panel' + (ci === 0 ? ' active' : '');
        panel.dataset.childId = child.id;
        const sec = buildSection(child);
        const secHeader = sec.querySelector('.section-header');
        if (secHeader) secHeader.remove();
        panel.appendChild(sec);
        tabPanels.appendChild(panel);
      });

      groupEl.appendChild(tabBar);
      groupEl.appendChild(tabPanels);
      content.appendChild(groupEl);

    } else {
      // ── REGULAR: sidebar ──
      const nav = document.createElement('div');
      nav.className = 'nav-item' + (idx === 0 ? ' active' : '');
      nav.style.setProperty('--pattern-color', p.color);
      nav.innerHTML = `
        <span class="nav-dot" style="background:${p.color}"></span>
        <span class="nav-label">${p.name}</span>
        <span class="nav-count">${p.problems.length}</span>`;
      nav.addEventListener('click', () => {
        setActiveNav(nav);
        scrollToSection(p.id);
        if (window.innerWidth <= 768) toggleMenu(false);
      });
      navList.appendChild(nav);

      // ── REGULAR: main content ──
      const section = buildSection(p);
      content.appendChild(section);
    }
  });

  setupObserver();
}

/* ═══════════════════════════════════════════
   NAV ACTIVE STATE
═══════════════════════════════════════════ */
function setActiveNav(navEl) {
  document.querySelectorAll('.nav-item, .nav-group-header').forEach(n => n.classList.remove('active'));
  navEl.classList.add('active');
}

/* ═══════════════════════════════════════════
   TAB SWITCHING
═══════════════════════════════════════════ */
function switchTab(groupId, childId) {
  const groupEl = document.getElementById(groupId);
  if (!groupEl) return;

  // Update tab buttons
  groupEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.childId === childId);
  });

  // Update tab panels
  groupEl.querySelectorAll('.tab-panel').forEach(panel => {
    panel.classList.toggle('active', panel.dataset.childId === childId);
  });

  // Sync sidebar child nav active state
  const navGroup = document.querySelector(`.nav-group[data-group-id="${groupId}"]`);
  if (navGroup) {
    navGroup.querySelectorAll('.nav-item.child').forEach(item => {
      const label = item.querySelector('.nav-label')?.textContent;
      const parentGroup = patterns.find(pg => pg.id === groupId);
      const child = parentGroup?.children.find(c => c.id === childId);
      if (child && label === child.name) item.classList.add('active');
      else item.classList.remove('active');
    });
  }
}

/* ═══════════════════════════════════════════
   INTERSECTION OBSERVER (active nav sync)
═══════════════════════════════════════════ */
function setupObserver() {
  const mainEl = document.getElementById('main-content');
  const sections = document.querySelectorAll('.pattern-section, .pattern-group');
  if (!sections.length) return;

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        // Try to find a direct nav-item with matching id, else a group header
        const directNav = document.querySelector(`.nav-item[data-section="${id}"]`);
        if (directNav) {
          setActiveNav(directNav);
        }
      }
    });
  }, { root: mainEl, threshold: 0.15 });

  sections.forEach(s => obs.observe(s));

  // Also use a scroll-based approach for more reliable active highlighting
  mainEl.addEventListener('scroll', onMainScroll, { passive: true });
}

function onMainScroll() {
  const mainEl = document.getElementById('main-content');
  const mainRect = mainEl.getBoundingClientRect();
  const sections = document.querySelectorAll('#content .pattern-section, #content .pattern-group');
  let topmost = null;
  let topmostDist = Infinity;

  sections.forEach(s => {
    const r = s.getBoundingClientRect();
    const dist = Math.abs(r.top - mainRect.top);
    if (r.top <= mainRect.top + mainRect.height * 0.4 && dist < topmostDist) {
      topmostDist = dist;
      topmost = s;
    }
  });

  if (!topmost) return;
  const id = topmost.id;

  // Find corresponding nav item
  let navEl =
    document.querySelector(`.nav-item[data-section-id="${id}"]`) ||
    document.querySelector(`.nav-group-header[data-group-id="${id}"]`);

  if (!navEl) {
    // Check if it's a child of a group
    document.querySelectorAll('.nav-item.child').forEach(child => {
      if (child.dataset.childId === id) navEl = child;
    });
  }
  if (navEl) setActiveNav(navEl);
}

/* ═══════════════════════════════════════════
   SHUFFLE  (Change #3)
═══════════════════════════════════════════ */
let currentToastProblem = null;
let toastTimer = null;

function shuffleProblem() {
  const all = getAllProblems();
  if (!all.length) return;

  const pick = all[Math.floor(Math.random() * all.length)];
  currentToastProblem = pick;
  showToast(pick);
}

function showToast(prob) {
  const toast     = document.getElementById('shuffle-toast');
  const titleEl   = document.getElementById('toast-title');
  const pillEl    = document.getElementById('toast-pill');
  const lcEl      = document.getElementById('toast-lc');
  const solveBtn  = document.getElementById('toast-solve');

  titleEl.textContent = prob.title;
  pillEl.textContent  = prob.patternName;
  pillEl.style.color       = prob.patternColor;
  pillEl.style.background  = prob.patternBg;
  pillEl.style.borderColor = prob.patternBorder;
  lcEl.textContent    = prob.lc ? `LC #${prob.lc}` : platformLabel[prob.platform];
  solveBtn.href       = prob.url;

  toast.classList.add('visible');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(closeToast, 8000);
}

function closeToast() {
  document.getElementById('shuffle-toast').classList.remove('visible');
  if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
}

function jumpToToastProblem() {
  if (!currentToastProblem) return;
  closeToast();

  setTimeout(() => {
    scrollToSection(currentToastProblem.patternId);
    highlightProblemRow(currentToastProblem);
  }, 120);
}

function highlightProblemRow(prob) {
  // Find the section and the row matching the problem title
  const section = document.getElementById(prob.patternId);
  if (!section) return;
  section.querySelectorAll('.problem-row').forEach(row => {
    const rowTitle = row.querySelector('.row-title');
    if (rowTitle && rowTitle.textContent.trim().includes(prob.title.trim())) {
      row.classList.add('highlighted');
      setTimeout(() => row.classList.remove('highlighted'), 1200);
    }
  });
}

/* ═══════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════ */
function handleSearch() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  if (!q) { renderAll(patterns); return; }

  const filtered = [];
  patterns.forEach(p => {
    if (p.isGroup) {
      const matchedChildren = p.children
        .map(child => ({
          ...child,
          problems: child.problems.filter(pr =>
            pr.title.toLowerCase().includes(q) ||
            child.name.toLowerCase().includes(q) ||
            p.name.toLowerCase().includes(q) ||
            (pr.lc && String(pr.lc).includes(q))
          )
        }))
        .filter(c => c.problems.length > 0);
      if (matchedChildren.length > 0) {
        filtered.push({ ...p, children: matchedChildren });
      }
    } else {
      const matchedProblems = p.problems.filter(pr =>
        pr.title.toLowerCase().includes(q) ||
        p.name.toLowerCase().includes(q) ||
        (pr.lc && String(pr.lc).includes(q))
      );
      if (matchedProblems.length > 0) {
        filtered.push({ ...p, problems: matchedProblems });
      }
    }
  });
  renderAll(filtered);
}

/* ═══════════════════════════════════════════
   MENU TOGGLE (mobile)
═══════════════════════════════════════════ */
function toggleMenu(force) {
  const s = document.getElementById('sidebar');
  const open = typeof force === 'boolean' ? force : !s.classList.contains('open');
  s.classList.toggle('open', open);
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderAll(patterns);
